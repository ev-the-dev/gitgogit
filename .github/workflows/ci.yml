name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Vet
        run: make vet

      - name: Lint
        run: make lint

      - name: Govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && make govulncheck

      - name: Build
        run: make build

      - name: Test
        run: make test
